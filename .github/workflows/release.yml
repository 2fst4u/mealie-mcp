name: Release

on:
  push:
    branches:
      - main

# Trusted Publishing (OIDC) needs `id-token: write`; creating releases/tags needs
# `contents: write`. No npm secret/token is required.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, release & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1, newer than Node 22 bundles.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Resolve version
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release v$VERSION already exists; skipping. Bump the version in package.json to publish a new release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.meta.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: gh release create "v$VERSION" --title "v$VERSION" --generate-notes

      # Publishes via OIDC Trusted Publishing — no NPM_TOKEN required, and npm
      # generates provenance automatically. Requires a one-time manual first
      # publish plus a Trusted Publisher configured on npmjs.com for this package
      # (repo: 2fst4u/mealie-mcp, workflow: release.yml). See the README.
      - name: Publish to npm (Trusted Publishing)
        if: steps.meta.outputs.exists == 'false'
        env:
          NAME: ${{ steps.meta.outputs.name }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already on npm; skipping publish."
          else
            npm publish --access public
          fi
