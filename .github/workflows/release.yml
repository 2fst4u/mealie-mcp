name: Release

on:
  push:
    branches:
      - main
    # Doc-only changes shouldn't cut a release. If a push to main touches ONLY
    # these paths, the whole workflow is skipped — no version bump, no publish.
    # A push that changes any other file still runs.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

# Trusted Publishing (OIDC) needs `id-token: write`; bumping the version and
# pushing the commit + tag and creating the release need `contents: write`.
# No npm secret/token is required.
permissions:
  contents: write
  id-token: write

# Releases bump the version and push a tag, so two at once would race. Queue
# them instead of running concurrently.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build, release & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Persist credentials so we can push the version-bump commit + tag
          # back to main at the end.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1, newer than Node 22 bundles.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Auto-bump the patch version. We update package.json (+ lockfile) in the
      # working tree only — no commit or tag yet — so the build, tests and npm
      # publish all see the new version. The commit + tag are pushed at the very
      # end, only after everything succeeds (see "Commit, tag & push").
      #
      # The next version is derived from the highest existing release *tag*, not
      # from package.json. The bump commit is pushed to main with [skip ci] and
      # can lag main whenever several PRs merge in a burst, so a package.json
      # basis made every queued release compute the same patch and collide on an
      # already-existing tag. Tags are the durable record of what shipped, so
      # basing the bump on them keeps serialized/queued runs strictly monotonic.
      - name: Determine next version
        id: bump
        run: |
          git fetch --tags --force origin
          next() { node -e "const p=process.argv[1].split('.').map(Number);p[2]++;console.log(p.join('.'))" "$1"; }
          LATEST=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n1)
          NEXT=$(next "${LATEST:-0.0.0}")
          # Belt-and-braces: skip forward over any patch already taken as a tag or
          # already on npm (e.g. a prior partial run that published without a tag).
          NAME=$(node -p "require('./package.json').name")
          while git rev-parse -q --verify "refs/tags/v$NEXT" >/dev/null \
             || npm view "$NAME@$NEXT" version >/dev/null 2>&1; do
            NEXT=$(next "$NEXT")
          done
          npm version "$NEXT" --no-git-tag-version --allow-same-version >/dev/null
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing v$NEXT"

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Publishes via OIDC Trusted Publishing — no NPM_TOKEN required, and npm
      # generates provenance automatically. Requires a one-time manual first
      # publish plus a Trusted Publisher configured on npmjs.com for this package
      # (repo: 2fst4u/mealie-mcp, workflow: release.yml). See the README.
      #
      # Done before pushing the commit/tag so that a publish failure leaves the
      # repo untouched (the bump only lives in the runner's working tree).
      - name: Publish to npm (Trusted Publishing)
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already on npm; skipping publish."
          else
            npm publish --access public
          fi

      # Persist the bump: commit package.json + lockfile and tag the release,
      # then push both back to main. Pushes made with GITHUB_TOKEN do not trigger
      # new workflow runs, and `[skip ci]` is belt-and-suspenders, so this does
      # not start a release loop.
      - name: Commit, tag & push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v$VERSION [skip ci]"
          # main may have advanced while this release ran (e.g. a burst of PR
          # merges queuing several releases). Rebase our single [skip ci] bump
          # commit onto the latest main so the push is a fast-forward instead of
          # being rejected — the tag is already computed to be unique, so runs
          # never fight over it. Tag *after* the rebase so the annotated tag
          # points at the commit that actually lands on main.
          git pull --rebase origin main
          # Annotated tag + explicit push: `--follow-tags` only pushes annotated
          # tags, and the GitHub release step needs the tag on the remote.
          git tag -a "$TAG" -m "v$VERSION"
          git push origin HEAD:main "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes
