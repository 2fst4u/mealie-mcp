name: CI

# Runs on pull_request only. A branch push that also has an open PR would
# otherwise trigger this workflow twice for the same commit, doubling the
# matrix. pull_request covers same-repo and fork PRs alike; pushes to main are
# handled by the release workflow (which runs typecheck/build/test).
on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/**"

jobs:
  test:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
